version: "3.9"

services:

  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai_sql_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  streamlit:

    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: ai_sql_streamlit

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      API_URL: http://api:8000

    depends_on:
      api:
        condition: service_healthy

    restart: unless-stopped