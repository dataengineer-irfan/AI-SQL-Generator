services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai_sql_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: ai_sql_streamlit

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      API_URL: http://api:8000/generate

    depends_on:
      - api

    restart: unless-stopped
    healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 30s
  timeout: 5s
  retries: 3